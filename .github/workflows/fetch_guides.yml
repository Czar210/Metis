name: 📚 Ingestão de Guias (Mobafire)

on:
  workflow_dispatch: # Permite rodar clicando no botão "Run workflow"
  schedule:
    - cron: '0 4 * * 0' # Roda às 04:00 da manhã de todo Domingo (UTC)

jobs:
  scrape-wisdom:
    runs-on: ubuntu-latest
    timeout-minutes: 180 # Dá 3 horas de limite, pois raspar web é mais lento

    steps:
      - name: 📥 Clonar Repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Mesma versão que o seu servidor usa

      - name: 📦 Instalar Dependências do Python
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 boto3 python-dotenv

      - name: 🌐 Instalar Navegador (Playwright)
        run: |
          playwright install chromium
          playwright install-deps # Crucial no GitHub Actions para não dar erro de biblioteca Linux faltando

      - name: 🚀 Executar Infiltrador do Mobafire
        env:
          # Mapeamento exato dos Secrets que você já cadastrou!
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
        run: |
          python -m scripts.ingestion.fetch_guides
