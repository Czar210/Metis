name: 📚 Ingestão de Guias (Mobafire)

on:
  workflow_dispatch: # Permite rodar clicando no botão "Run workflow"
  schedule:
    - cron: '0 4 */3 * *' # Roda às 04:00 UTC a cada 3 dias

jobs:
  scrape-wisdom:
    runs-on: ubuntu-latest
    timeout-minutes: 240 # 4h — 172 campeões × 2 guias (~50s/guia estimado)

    steps:
      - name: 📥 Clonar Repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Instalar Dependências do Python
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 boto3 python-dotenv

      - name: 🌐 Instalar Navegador (Playwright)
        run: |
          playwright install chromium
          playwright install-deps

      - name: 💾 Restaurar cache de URLs visitadas
        uses: actions/cache@v4
        with:
          path: data/raw/guides_preview/_visited_urls.json
          # Chave muda a cada run para sempre salvar a versão mais nova
          key: visited-urls-${{ github.run_id }}
          restore-keys: |
            visited-urls-

      - name: 🚀 Executar Infiltrador do Mobafire (todos os 172 campeões)
        env:
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
        run: |
          python -m scripts.ingestion.fetch_guides --auto --headless --guides 2
